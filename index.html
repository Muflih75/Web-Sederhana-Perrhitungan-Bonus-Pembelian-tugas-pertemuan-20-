<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Elektronik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
    *{
        font-family:'Poppins',sans-serif;
    }
    
    body{
        background:#f4f7fc;
    }
    
    .navbar{
        /* box-shadow:0 2px 10px rgba(0,0,0,.1); */
        background:linear-gradient(135deg, #005461,#0C7779,#249E94, #3BC1A8);
    }
    
    .hero{
        background:linear-gradient(135deg, #3BC1A8, #249E94, #0C7779, #005461);
        color:white;
        padding:70px 20px;
        text-align:center;
    }
    
    .hero h1{
        font-weight:700;
    }
    
    .hero p{
        opacity:.9;
    }
    
    .form-card{
        margin-top:-40px;
        border:none;
        border-radius:20px;
        box-shadow:0 10px 30px rgba(0,0,0,.15);
    }
    
    .btn{
        transition:.3s;
    }
    
    .btn:hover{
        transform:translateY(-2px);
    }
    
    .result-card{
        border:none;
        border-radius:15px;
        background:#F0F0F0;
        display:none;
        animation:fadeIn .8s ease;
    }
    
    .result-item{
        display:flex;
        justify-content:space-between;
        margin-bottom:10px;
    }
    
    .total-bayar{
        font-size:22px;
        font-weight:700;
        color:#198754;
    }
    
    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }
    
    .footer{
        margin-top:50px;
        text-align:center;
        color:gray;
        padding:20px;
    }
    </style>

</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-lightning-charge-fill text-warning me-2"></i>
                TOKO ELEKTRONIK
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <h1>Selamat Datang di Toko Elektronik</h1>
            <p>Sistem Perhitungan Bonus Pembelian</p>
        </div>
    </section>

    <!-- Form -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card form-card p-4">
                    <h3 class="text-center mb-4">Form Transaksi</h3>
                    <div class="mb-3">
                        <label class="form-label">Nama Pelanggan</label>
                        <input type="text" id="nama" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nama Produk</label>
                        <input type="text" id="produk" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Harga Produk</label>
                        <input type="number" id="harga" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Jumlah Pembelian</label>
                        <input type="number" id="jumlah" class="form-control">
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-success" onclick="hitung()">Hitung</button>
                        <button class="btn btn-danger" onclick="resetForm()">Reset</button>
                    </div>

    <!-- Hasil -->
    <div id="hasil" class="card result-card mt-4 p-4">
        <h4 class="text-center mb-3">Hasil Perhitungan</h4>
        <div class="result-item">
            <span>Nama Pelanggan</span>
            <strong id="hNama"></strong>
        </div>
        <div class="result-item">
            <span>Nama Produk</span>
            <strong id="hProduk"></strong>
        </div>
        <div class="result-item">
            <span>Total Belanja</span>
            <strong id="hBelanja"></strong>
        </div>
        <div class="result-item">
            <span>Potongan</span>
            <strong id="hPotongan"></strong>
        </div>
        
        <hr>
        <div class="text-center">
            <p>Total Bayar</p>
            <div class="total-bayar" id="hBayar"></div>
        </div>
                </div>
            </div>
        </div>
    </div>
    </div>
    <div class="footer">© 2026 Toko Elektronik | Pemrograman Web 1</div>

    <script>
    function rupiah(angka){
        return "Rp " + angka.toLocaleString("id-ID");
    }

    function hitung(){
        let nama = document.getElementById("nama").value;
        let produk = document.getElementById("produk").value;
        let harga = document.getElementById("harga").value;
        let jumlah = document.getElementById("jumlah").value;
        
        if(
            nama=="" ||
            produk=="" ||
            harga=="" ||
            jumlah==""
        ){
            alert("Semua data wajib diisi!");
            return;
        }
        
        harga=parseInt(harga);
        jumlah=parseInt(jumlah);
        
        let totalBelanja = harga * jumlah;
        let potongan = 0;
        
        if(
            totalBelanja >= 400000
        ){
            potongan = 50000;
        }
        
        let totalBayar = totalBelanja - potongan;
        
        document.getElementById("hNama").innerHTML = nama;
        document.getElementById("hProduk").innerHTML = produk;
        document.getElementById("hBelanja").innerHTML = rupiah(totalBelanja);
        document.getElementById("hPotongan").innerHTML = rupiah(potongan);
        document.getElementById("hBayar").innerHTML = rupiah(totalBayar);
        document.getElementById("hasil").style.display="block";
    }

    function resetForm(){
        document.getElementById("nama").value="";
        document.getElementById("produk").value="";
        document.getElementById("harga").value="";
        document.getElementById("jumlah").value="";
        document.getElementById("hasil").style.display="none";
    }
    
    </script>

</body>
</html>
